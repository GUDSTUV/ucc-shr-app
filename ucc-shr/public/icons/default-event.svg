    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)" />
  <circle cx="940" cy="130" r="160" fill="#334155" opacity="0.45" />
  <circle cx="230" cy="560" r="220" fill="#475569" opacity="0.38" />
  <rect x="140" y="160" width="920" height="380" rx="24" fill="#f8fafc" opacity="0.1" />
  <text x="600" y="350" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="54" font-weight="700">CEGRAD Event</text>
